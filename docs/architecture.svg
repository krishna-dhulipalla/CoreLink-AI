<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="100%" height="100%">
  <style>
    .canvas { fill: #0f172a; }
    .panel { fill: #f8fafc; stroke: #d7e0ea; stroke-width: 1.5; rx: 24; }
    .panel-soft { fill: #f8fbff; stroke: #d7e0ea; stroke-width: 1.5; rx: 20; }
    .box { fill: #ffffff; stroke: #a8b8cc; stroke-width: 2; rx: 16; }
    .box-accent { fill: #eef4ff; stroke: #4f7ee8; stroke-width: 2.5; rx: 16; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #183153; text-anchor: middle; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #52637a; text-anchor: middle; }
    .small { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #6b7b90; text-anchor: middle; }
    .panel-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #52637a; text-anchor: middle; }
    .line { stroke: #61748c; stroke-width: 3; fill: none; }
    .line-soft { stroke: #8fa2ba; stroke-width: 2.25; fill: none; stroke-dasharray: 8 8; }
    .marker { fill: #61748c; }
    .marker-soft { fill: #8fa2ba; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker-soft"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" class="canvas"/>

  <rect x="90" y="110" width="940" height="610" class="panel"/>
  <text x="560" y="145" class="panel-title">Core Runtime</text>

  <rect x="1080" y="110" width="230" height="610" class="panel"/>
  <text x="1195" y="145" class="panel-title">Persistence</text>

  <rect x="470" y="30" width="180" height="64" class="box-accent"/>
  <text x="560" y="70" class="title">A2A Request</text>

  <rect x="450" y="175" width="220" height="74" class="box"/>
  <text x="560" y="214" class="title">Intake</text>
  <text x="560" y="237" class="label">Normalize task and output requirements</text>

  <rect x="450" y="280" width="220" height="74" class="box"/>
  <text x="560" y="319" class="title">Profile + Template</text>
  <text x="560" y="342" class="label">Pick the right execution path</text>

  <rect x="450" y="385" width="220" height="74" class="box"/>
  <text x="560" y="424" class="title">Context Builder</text>
  <text x="560" y="447" class="label">Assemble evidence, assumptions, and sources</text>

  <rect x="250" y="515" width="240" height="82" class="box"/>
  <text x="370" y="556" class="title">Solver</text>
  <text x="370" y="580" class="label">Stage-based reasoning and exact compute</text>

  <rect x="620" y="515" width="240" height="82" class="box"/>
  <text x="740" y="556" class="title">Tool Runner</text>
  <text x="740" y="580" class="label">One tool step with normalized results</text>

  <rect x="250" y="625" width="240" height="82" class="box"/>
  <text x="370" y="666" class="title">Review Gates</text>
  <text x="370" y="690" class="label">Milestone and final quality checks</text>

  <rect x="620" y="625" width="240" height="82" class="box"/>
  <text x="740" y="666" class="title">Output Adapter</text>
  <text x="740" y="690" class="label">Apply exact response format</text>

  <rect x="905" y="625" width="95" height="82" class="box-accent"/>
  <text x="952" y="666" class="title">Reflect</text>
  <text x="952" y="690" class="small">store only</text>

  <rect x="145" y="280" width="220" height="150" class="panel-soft"/>
  <text x="255" y="318" class="title">Evidence + MCP Tools</text>
  <text x="255" y="346" class="small">market data</text>
  <text x="255" y="368" class="small">financial analytics</text>
  <text x="255" y="390" class="small">risk metrics</text>
  <text x="255" y="412" class="small">document extraction</text>

  <rect x="1115" y="190" width="160" height="95" class="panel-soft"/>
  <text x="1195" y="230" class="title">SQLite Memory</text>
  <text x="1195" y="255" class="label">Versioned records</text>

  <rect x="1115" y="340" width="160" height="115" class="panel-soft"/>
  <text x="1195" y="380" class="title">Run Records</text>
  <text x="1195" y="405" class="small">run, tool, review, curation</text>
  <text x="1195" y="428" class="small">store-only history</text>

  <rect x="1115" y="515" width="160" height="115" class="panel-soft"/>
  <text x="1195" y="555" class="title">Offline Curation</text>
  <text x="1195" y="580" class="small">pack updates</text>
  <text x="1195" y="602" class="small">review dimensions</text>

  <line x1="560" y1="94" x2="560" y2="173" class="line" marker-end="url(#arrow)"/>
  <line x1="560" y1="249" x2="560" y2="278" class="line" marker-end="url(#arrow)"/>
  <line x1="560" y1="354" x2="560" y2="383" class="line" marker-end="url(#arrow)"/>
  <path d="M 560 459 C 560 492 450 500 390 513" class="line" marker-end="url(#arrow)"/>
  <line x1="490" y1="556" x2="618" y2="556" class="line" marker-end="url(#arrow)"/>
  <path d="M 740 597 C 740 618 500 620 380 623" class="line" marker-end="url(#arrow)"/>
  <line x1="490" y1="666" x2="618" y2="666" class="line" marker-end="url(#arrow)"/>
  <line x1="860" y1="666" x2="903" y2="666" class="line" marker-end="url(#arrow)"/>

  <path d="M 370 625 C 370 607 370 603 370 599" class="line-soft" marker-end="url(#arrow-soft)"/>
  <text x="248" y="614" class="small">revise or selective backtrack</text>

  <path d="M 365 430 C 410 430 430 430 448 430" class="line-soft" marker-end="url(#arrow-soft)"/>
  <text x="255" y="456" class="small">structured evidence only</text>

  <path d="M 952 625 C 952 510 1110 495 1195 455" class="line-soft" marker-end="url(#arrow-soft)"/>
  <path d="M 1195 285 C 1195 315 1195 326 1195 338" class="line-soft" marker-end="url(#arrow-soft)"/>
  <path d="M 1195 455 C 1195 483 1195 499 1195 513" class="line-soft" marker-end="url(#arrow-soft)"/>
</svg>
